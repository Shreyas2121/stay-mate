# docker-compose.yml
version: '3.8'

services:
  # Service 1: The Database
  postgres:
    image: postgres:17-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: stay-mate
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
